spring.application.name=api

#servidor
server.port=8080

#postgreSQL
# variables de entorno para que ECS las inyecte
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://techstore-bd.cxy4rhhu5ie5.us-east-1.rds.amazonaws.com:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:techstore-bd}
spring.datasource.driver-class-name=org.postgresql.Driver

#jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

aws.sqs.queue.url=https://sqs.us-east-1.amazonaws.com/931872220148/techstore-audit-queue